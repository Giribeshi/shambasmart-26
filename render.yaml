services:
  # Backend API Service
  - type: web
    name: shambasmart-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: shambasmart-jwt-secret-key-2024
      - key: PORT
        value: 10000
    healthCheckPath: /
    autoDeploy: true
    
  # Frontend Service (Optional - can also use Netlify)
  - type: web
    name: shambasmart-frontend
    env: static
    plan: free
    buildCommand: cd client && npm install && npm run build
    publishPath: client/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://shambasmart-api.onrender.com
    autoDeploy: true
